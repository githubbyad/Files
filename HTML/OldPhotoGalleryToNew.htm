<div class="bellyful-gallery">

    <h2>Bellyful - lion king colo</h2>

    <div class="bellyful-viewer">

        <button class="bellyful-btn bellyful-prev">❮</button>

        <div id="bellyfulLink" style="cursor:pointer;">
            <img id="bellyfulImage" src="" alt="">
        </div>

        <button class="bellyful-btn bellyful-next">❯</button>

    </div>

    <div class="bellyful-caption" id="bellyfulCaption"></div>

    <div class="bellyful-dots" id="bellyfulDots"></div>

    <div class="bellyful-data">

        {{RepeatBegin}}

        <div
            class="slide"
            data-image="{{HeadingImage}}"
            data-title="{{Heading}}"
            data-link="{{HeadingLink}}"
            data-alt="{{HeadingImageAlt}}">
        </div>

        {{RepeatEnd}}

    </div>

</div>

<script>
(function(){

const slides=[...document.querySelectorAll('.bellyful-data .slide')];

if(!slides.length) return;

const img=document.getElementById('bellyfulImage');
const link=document.getElementById('bellyfulLink');
const caption=document.getElementById('bellyfulCaption');
const dots=document.getElementById('bellyfulDots');

let current=0;

slides.forEach((s,i)=>{

    const dot=document.createElement('span');
    dot.className='bellyful-dot';
    dot.onclick=function(){
        show(i);
    };

    dots.appendChild(dot);

});

const dotItems=[...dots.children];

function show(i){

    if(i<0) i=slides.length-1;
    if(i>=slides.length) i=0;

    current=i;

    const slide=slides[current];

    img.src=slide.dataset.image;
    img.alt=slide.dataset.alt || slide.dataset.title;

    link.onclick = function () {
        OpenPopup2(
            slide.dataset.image,
            'iframe',
            800,
            408
        );
        return false;
    };

    caption.textContent=slide.dataset.title || "";

    dotItems.forEach(d=>d.classList.remove('active'));
    dotItems[current].classList.add('active');

}

document.querySelector('.bellyful-prev').onclick=function(){
    show(current-1);
};

document.querySelector('.bellyful-next').onclick=function(){
    show(current+1);
};

document.addEventListener('keydown',function(e){

    if(e.key==="ArrowLeft")
        show(current-1);

    if(e.key==="ArrowRight")
        show(current+1);

});

let startX=0;

img.addEventListener('touchstart',function(e){
    startX=e.touches[0].clientX;
});

img.addEventListener('touchend',function(e){

    let endX=e.changedTouches[0].clientX;

    if(startX-endX>40)
        show(current+1);

    if(endX-startX>40)
        show(current-1);

});

show(0);

})();
</script>
<style>
.bellyful-gallery{
    max-width:420px;
    margin:20px auto;
    font-family:Arial,Helvetica,sans-serif;
}

.bellyful-gallery h2{
    margin:0 0 10px;
    text-align:center;
    font-size:20px;
}

.bellyful-viewer{
    position:relative;
    background:#f3f3f3;
    border:1px solid #ccc;
    overflow:hidden;
}

.bellyful-viewer a{
    display:block;
    text-decoration:none;
}

.bellyful-viewer img{
    width:100%;
    display:block;
    aspect-ratio:5/3;
    object-fit:contain;
    background:#fff;
}

.bellyful-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:38px;
    height:38px;
    border:none;
    background:rgba(0,0,0,.65);
    color:#fff;
    cursor:pointer;
    font-size:22px;
    z-index:5;
}

.bellyful-prev{
    left:8px;
}

.bellyful-next{
    right:8px;
}

.bellyful-btn:hover{
    background:#000;
}

.bellyful-caption{
    padding:10px;
    text-align:center;
    font-weight:bold;
}

.bellyful-dots{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:10px;
}

.bellyful-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#bbb;
    cursor:pointer;
}

.bellyful-dot.active{
    background:#000;
}

.bellyful-data{
    display:none;
}
</style>
